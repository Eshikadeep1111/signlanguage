<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Language Detector</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        #video-container {
            position: relative;
            width: 100vw;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* mirror */
        }
        #canvas { display: none; }
        .bottom-ui {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.85) 20%, #000);
            padding: 40px 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20;
        }
        #text-overlay {
            color: #00FF00;
            font-size: 2rem;
            font-weight: bold;
            min-height: 2.5rem;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
            letter-spacing: 4px;
        }
        #current-sign {
            color: rgba(255,255,255,0.7);
            font-size: 1rem;
            margin-top: 4px;
        }
        .controls {
            margin-top: 12px;
            display: flex;
            gap: 12px;
        }
        button {
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: bold;
        }
        #btn-clear { background: #e74c3c; color: #fff; }
        #btn-space { background: #3498db; color: #fff; }
        h1 {
            margin: 10px 0 0;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        #detection-zone-guide {
            position: absolute;
            bottom: 20%; left: 20%; width: 60%; height: 40%;
            border: 2px dashed rgba(255,255,255,0.25);
            border-radius: 15px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
<div id="video-container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="detection-zone-guide"></div>
    <div class="bottom-ui">
        <div id="text-overlay">___</div>
        <div id="current-sign">Initializing camera...</div>
        <div class="controls">
            <button id="btn-space">Space</button>
            <button id="btn-clear">Clear</button>
        </div>
        <h1>Live Sign Language Detection</h1>
    </div>
</div>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const textOverlay = document.getElementById('text-overlay');
    const currentSign = document.getElementById('current-sign');

    let generatedText = '';
    let lastPrediction = null;
    let framesHeld = 0;
    const REQUIRED_FRAMES = 15;
    let predicting = false;

    // Start webcam
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
        .then(stream => {
            video.srcObject = stream;
            currentSign.textContent = 'Show your hand...';
            requestAnimationFrame(loop);
        })
        .catch(err => {
            currentSign.textContent = 'Camera error: ' + err.message;
        });

    async function loop() {
        if (!predicting) {
            predicting = true;
            await predict();
            predicting = false;
        }
        requestAnimationFrame(loop);
    }

    async function predict() {
        if (video.readyState < 2) return;

        canvas.width = 320;
        canvas.height = 240;
        ctx.drawImage(video, 0, 0, 320, 240);
        const imageData = canvas.toDataURL('image/jpeg', 0.7);

        try {
            const res = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData })
            });
            const data = await res.json();
            const predicted = data.prediction;

            if (predicted) {
                currentSign.textContent = `Detecting: ${predicted}`;
                if (predicted === lastPrediction) {
                    framesHeld++;
                } else {
                    framesHeld = 0;
                    lastPrediction = predicted;
                }
                if (framesHeld === REQUIRED_FRAMES) {
                    generatedText += predicted;
                    textOverlay.textContent = generatedText || '___';
                }
            } else {
                currentSign.textContent = 'Show your hand...';
                lastPrediction = null;
                framesHeld = 0;
            }
        } catch (e) {
            console.error(e);
        }
    }

    document.getElementById('btn-clear').onclick = () => {
        generatedText = '';
        textOverlay.textContent = '___';
        lastPrediction = null;
        framesHeld = 0;
    };
    document.getElementById('btn-space').onclick = () => {
        generatedText += ' ';
        textOverlay.textContent = generatedText;
    };
</script>
</body>
</html>
